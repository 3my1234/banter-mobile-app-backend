version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: banter-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: PHYSICS1234
      POSTGRES_DB: banter_db
    ports:
      - "5433:5432" # Maps VPS 5433 to Container 5432 (avoids conflict with election project)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d banter_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banter-network

  # Redis for BullMQ
  redis:
    image: redis:7-alpine
    container_name: banter-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banter-network

  # Backend API
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banter-backend
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      NODE_ENV: production
      PORT: 3001
      DOMAIN: ${DOMAIN:-sportbanter.online}
      API_URL: https://${DOMAIN:-sportbanter.online}
      APP_ROLE: ${APP_ROLE:-all}
      FRONTEND_URL: ${FRONTEND_URL}
      DATABASE_URL: postgresql://postgres:PHYSICS1234@db:5432/banter_db
      DB_CONNECTION_LIMIT: ${DB_CONNECTION_LIMIT:-20}
      DB_POOL_TIMEOUT_SEC: ${DB_POOL_TIMEOUT_SEC:-20}
      DB_USE_PGBOUNCER: ${DB_USE_PGBOUNCER:-0}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: ${REDIS_URL:-}
      PRIVY_APP_ID: ${PRIVY_APP_ID}
      PRIVY_APP_SECRET: ${PRIVY_APP_SECRET}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      MOVEMENT_TESTNET_RPC: ${MOVEMENT_TESTNET_RPC}
      MOVEMENT_INDEXER_URL: ${MOVEMENT_INDEXER_URL}
      MOVEMENT_USDC_ADDRESS: ${MOVEMENT_USDC_ADDRESS}
      MOVEMENT_ROL_ADDRESS: ${MOVEMENT_ROL_ADDRESS}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL}
      SOLANA_USDC_MINT: ${SOLANA_USDC_MINT}
      MEDIA_PIPELINE_SECRET: ${MEDIA_PIPELINE_SECRET}
      API_RATE_LIMIT_WINDOW_MS: ${API_RATE_LIMIT_WINDOW_MS:-60000}
      API_RATE_LIMIT_MAX: ${API_RATE_LIMIT_MAX:-500}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-60000}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-60}
      WALLET_OVERVIEW_CACHE_TTL_MS: ${WALLET_OVERVIEW_CACHE_TTL_MS:-5000}
      WALLET_OVERVIEW_CACHE_MAX_ENTRIES: ${WALLET_OVERVIEW_CACHE_MAX_ENTRIES:-1000}
      QUEUE_WORKER_CONCURRENCY: ${QUEUE_WORKER_CONCURRENCY:-5}
      QUEUE_WORKER_RATE_LIMIT_MAX: ${QUEUE_WORKER_RATE_LIMIT_MAX:-0}
      QUEUE_WORKER_RATE_LIMIT_DURATION_MS: ${QUEUE_WORKER_RATE_LIMIT_DURATION_MS:-0}
      QUEUE_JOB_ATTEMPTS: ${QUEUE_JOB_ATTEMPTS:-3}
      QUEUE_JOB_BACKOFF_MS: ${QUEUE_JOB_BACKOFF_MS:-5000}
      QUEUE_JOB_REMOVE_ON_COMPLETE: ${QUEUE_JOB_REMOVE_ON_COMPLETE:-1000}
      QUEUE_JOB_REMOVE_ON_FAIL: ${QUEUE_JOB_REMOVE_ON_FAIL:-5000}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - banter-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  banter-network:
    driver: bridge
